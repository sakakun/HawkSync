name: Development Build and Publish

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  SERVERMANAGER_PROJECT_PATH: BHD-ServerManager/ServerManager.csproj
  REMOTECLIENT_PROJECT_PATH: RemoteClient/RemoteClient.csproj
  NETLIMITERBRIDGE_PROJECT_PATH: NetLimiterBridge/NetLimiterBridge.csproj
  HAWKSYNCSHARED_PROJECT_PATH: HawkSyncShared/HawkSyncShared.csproj
  DOTNET_VERSION: '10.0.x'
  BUILD_CONFIGURATION: Release

jobs:
  validate:
    name: Validate Release
    runs-on: windows-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      dynamic_tag: ${{ steps.gen_tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $version = "0.0.0"
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Generate dynamic tag
        id: gen_tag
        shell: pwsh
        run: |
          $commit = git rev-parse --short HEAD
          "tag=dev-$commit" >> $env:GITHUB_OUTPUT

      - name: Validate version format
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.version }}"
          if ("${{ github.ref_type }}" -eq "tag" -and $version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Invalid version format: $version"
          }

  build-shared-and-bridge:
    name: Build Shared + Bridge
    needs: validate
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            **/global.json
            **/nuget.config
            **/*.csproj

      - uses: microsoft/setup-msbuild@v2

      - name: Restore HawkSyncShared
        run: dotnet restore ${{ env.HAWKSYNCSHARED_PROJECT_PATH }}

      - name: Build HawkSyncShared
        run: >
          dotnet build ${{ env.HAWKSYNCSHARED_PROJECT_PATH }}
          --configuration ${{ env.BUILD_CONFIGURATION }}
          --no-restore
          /p:Version="${{ needs.validate.outputs.version }}"
          /p:AssemblyVersion="${{ needs.validate.outputs.version }}"
          /p:FileVersion="${{ needs.validate.outputs.version }}"

      - name: Restore and build NetLimiterBridge
        shell: pwsh
        run: |
          msbuild ${{ env.NETLIMITERBRIDGE_PROJECT_PATH }} `
            /t:Restore,Build `
            /p:Configuration=Release `
            /p:Platform="Any CPU" `
            /p:OutputPath=bin/Release/ `
            /p:PlatformTarget=x64 `
            /m

      - name: Upload shared outputs
        uses: actions/upload-artifact@v4
        with:
          name: shared-and-bridge
          path: |
            ./HawkSyncShared/bin/Release/**
            ./NetLimiterBridge/bin/Release/**
          retention-days: 7

  build-apps:
    name: Build and Publish Apps
    needs: [validate, build-shared-and-bridge]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: ServerManager
            project: BHD-ServerManager/ServerManager.csproj
            output: ./publish/framework-dependent/ServerManager
            zip: HawkSync-ServerManager
          - name: RemoteClient
            project: RemoteClient/RemoteClient.csproj
            output: ./publish/framework-dependent/RemoteClient
            zip: HawkSync-RemoteClient

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            **/global.json
            **/nuget.config
            **/*.csproj

      - name: Download shared outputs
        uses: actions/download-artifact@v4
        with:
          name: shared-and-bridge
          path: ./deps

      - name: Restore app
        run: dotnet restore ${{ matrix.app.project }}

      - name: Build app
        run: >
          dotnet build ${{ matrix.app.project }}
          --configuration ${{ env.BUILD_CONFIGURATION }}
          --no-restore
          /p:Version="${{ needs.validate.outputs.version }}"
          /p:AssemblyVersion="${{ needs.validate.outputs.version }}"
          /p:FileVersion="${{ needs.validate.outputs.version }}"

      - name: Publish app
        run: >
          dotnet publish ${{ matrix.app.project }}
          --configuration ${{ env.BUILD_CONFIGURATION }}
          --runtime win-x64
          --self-contained false
          --no-build
          --output ${{ matrix.app.output }}
          /p:PublishReadyToRun=true
          /p:Version="${{ needs.validate.outputs.version }}"

      - name: Copy shared deps
        shell: pwsh
        run: |
          Copy-Item -Path ./deps/HawkSyncShared/bin/Release/* `
            -Destination ${{ matrix.app.output }}/ `
            -Recurse -Force

          if ("${{ matrix.app.name }}" -eq "ServerManager") {
            New-Item -ItemType Directory -Force -Path "${{ matrix.app.output }}/NetLimiterBridge" | Out-Null
            Copy-Item -Path ./deps/NetLimiterBridge/bin/Release/* `
              -Destination "${{ matrix.app.output }}/NetLimiterBridge/" `
              -Recurse -Force
          }

      - name: Create zip
        shell: pwsh
        run: |
          $version = "${{ needs.validate.outputs.version }}"
          Compress-Archive -Path ${{ matrix.app.output }}/* `
            -DestinationPath "./${{ matrix.app.zip }}-v$version-FrameworkDependent.zip"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app.zip }}-v${{ needs.validate.outputs.version }}
          path: ./${{ matrix.app.zip }}-v${{ needs.validate.outputs.version }}-FrameworkDependent.zip
          retention-days: 90

  package-release:
    name: Package Release Metadata
    needs: [validate, build-apps]
    runs-on: windows-latest

    steps:
      - name: Download ServerManager zip
        uses: actions/download-artifact@v4
        with:
          name: HawkSync-ServerManager-v${{ needs.validate.outputs.version }}

      - name: Download RemoteClient zip
        uses: actions/download-artifact@v4
        with:
          name: HawkSync-RemoteClient-v${{ needs.validate.outputs.version }}

      - name: Generate checksums
        shell: pwsh
        run: |
          $version = "${{ needs.validate.outputs.version }}"
          $files = @(
            "HawkSync-ServerManager-v$version-FrameworkDependent.zip",
            "HawkSync-RemoteClient-v$version-FrameworkDependent.zip"
          )

          $checksums = foreach ($file in $files) {
            $hash = (Get-FileHash $file -Algorithm SHA256).Hash
            "$hash  $file"
          }

          $checksums | Out-File -FilePath "checksums.txt" -Encoding ascii

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-packages-v${{ needs.validate.outputs.version }}
          path: |
            ./HawkSync-ServerManager-v${{ needs.validate.outputs.version }}-FrameworkDependent.zip
            ./HawkSync-RemoteClient-v${{ needs.validate.outputs.version }}-FrameworkDependent.zip
            ./checksums.txt
          retention-days: 90

  create-release:
    name: Create GitHub Release
    needs: [validate, package-release]
    runs-on: windows-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: release-packages-v${{ needs.validate.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.dynamic_tag }}
          name: Pre-release Development Build ${{ needs.validate.outputs.dynamic_tag }}
          files: |
            ./HawkSync-ServerManager-v${{ needs.validate.outputs.version }}-FrameworkDependent.zip
            ./HawkSync-RemoteClient-v${{ needs.validate.outputs.version }}-FrameworkDependent.zip
            ./checksums.txt
          draft: false
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
